<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- Makes the website responsive on mobile devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Me</title>

    <!-- External CSS link -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- HEADER SECTION -->
    <header>
        <h1>Contact Me</h1>

        <!-- FLEXBOX NAVIGATION BAR -->
        <nav class="navbar">
            <a href="ProfilePage.html">Bio</a>
            <a href="Contact.html">Contact</a>
        </nav>
    </header>

    <!-- MAIN CONTENT -->
    <main>

        <!-- CONTACT FORM SECTION -->
        <section class="contact-section">
            <h2>Send Me a Message</h2>

            <!-- Functional-looking contact form -->
            <form action="#" method="post" class="contact-form">

                <!-- Full name input -->
                <label for="fullname">Full Name:</label>
                <input type="text" id="fullname" name="fullname" placeholder="Enter your full name" required>

                <!-- Email input -->
                <label for="email">Email Address:</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <!-- Subject input -->
                <label for="subject">Subject:</label>
                <input type="text" id="subject" name="subject" placeholder="Enter your subject">

                <!-- Message input -->
                <label for="message">Message:</label>
                <textarea id="message" name="message" rows="5" placeholder="Write your message here" required></textarea>

                <!-- Submit button -->
                <button type="submit">Send Message</button>

            </form>
        </section>

        <!-- ADDITIONAL CONTACT INFO -->
        <section class="info-section">
            <article>
                <h2>Other Contact Information</h2>
                <p>Email: jericjaymejorada@gmail.com</p>
                <p>Location: Philippines, Manila</p>
            </article>
        </section>

    </main>

    <!-- FOOTER SECTION -->
    <footer>
        <p>&copy; 2026 Contact Page. All rights reserved.</p>
    </footer>

</body>
</html>
